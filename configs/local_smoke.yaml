run_name: local_smoke
seed: 42

dataset:
  name: lewtun/music_genres
  train_split: train
  eval_split: test
  audio_column: audio
  label_column: genre
  label_id_column: genre_id

mert:
  model_name: m-a-p/MERT-v1-95M
  sample_rate: 24000
  layer: last
  pooling: mean

runtime:
  device: auto
  batch_size_cpu: 1
  batch_size_cuda: 4
  cpu_full_warning_threshold: 512

embedding:
  max_samples_per_split: 12
  resume: true
  save_every_batches: 2

classifier:
  logistic_max_iter: 1000
  logistic_class_weight: balanced
  mlp_hidden_layer_sizes: [128]
  mlp_max_iter: 300
  mlp_alpha: 0.0001
  mlp_early_stopping: false

artifacts:
  processed_dir: data/processed
  models_dir: models
  reports_dir: reports

